<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0a2e">
<meta name="apple-mobile-web-app-title" content="Phone Shop">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%231a0a2e'/%3E%3Cpath d='M90 30 L110 80 L155 90 L120 120 L130 165 L90 140 L50 165 L60 120 L25 90 L70 80 Z' fill='%23ec4899'/%3E%3C/svg%3E">
<title>Phone Shop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-deep: #0a0418;
    --bg-base: #1a0a2e;
    --bg-card: rgba(45, 27, 78, 0.4);
    --card-border: rgba(236, 72, 153, 0.18);
    --pink: #ec4899;
    --pink-bright: #f9a8d4;
    --pink-glow: rgba(236, 72, 153, 0.6);
    --purple: #a855f7;
    --purple-bright: #c084fc;
    --purple-glow: rgba(168, 85, 247, 0.5);
    --text: #fff;
    --text-soft: rgba(255, 255, 255, 0.72);
    --text-muted: rgba(255, 255, 255, 0.45);
  }

  html, body {
    height: 100%;
    width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--text);
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .device-wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #0a0418 0%, #000 100%);
  }

  .device {
    position: relative;
    width: 100%;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    background: var(--bg-base);
  }

  @media (min-width: 600px) {
    .device {
      width: 390px;
      height: 800px;
      max-height: 95vh;
      border-radius: 48px;
      box-shadow: 0 0 0 11px #1a1a1a, 0 0 0 13px #2a2a2a, 0 30px 80px rgba(0,0,0,0.5), 0 15px 40px rgba(236, 72, 153, 0.2);
    }
    .device::before {
      content: "";
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 30px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 100;
      pointer-events: none;
    }
  }

  .bg-effects {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .bg-effects::before,
  .bg-effects::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.6;
  }
  .bg-effects::before {
    width: 320px;
    height: 320px;
    top: -80px;
    right: -100px;
    background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
    animation: floatOrb 12s ease-in-out infinite;
  }
  .bg-effects::after {
    width: 280px;
    height: 280px;
    bottom: -60px;
    left: -80px;
    background: radial-gradient(circle, var(--purple) 0%, transparent 70%);
    animation: floatOrb 14s ease-in-out infinite reverse;
  }
  @keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, 30px) scale(1.1); }
    66% { transform: translate(-15px, -20px) scale(0.95); }
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(236, 72, 153, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(236, 72, 153, 0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 90%);
  }

  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    animation: fadeIn 0.4s ease;
    z-index: 1;
  }
  .screen.active { display: flex; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ============================================ SCREEN 1 ============================================ */
  .top-bar {
    position: relative;
    z-index: 5;
    padding: calc(env(safe-area-inset-top, 0) + 18px) 22px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-shrink: 0;
  }
  @media (min-width: 600px) {
    .top-bar { padding-top: 58px; }
  }

  .logo-mark {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 3.5px;
    background: linear-gradient(135deg, var(--pink-bright) 0%, var(--purple-bright) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .cart-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(236, 72, 153, 0.12);
    border: 1px solid rgba(236, 72, 153, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--pink-bright);
    position: relative;
  }
  .cart-btn svg { width: 16px; height: 16px; }
  .cart-dot {
    position: absolute;
    top: 6px;
    right: 7px;
    width: 7px;
    height: 7px;
    background: var(--pink);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--pink-glow);
  }

  .search-bar {
    position: relative;
    z-index: 5;
    margin: 14px 22px 8px;
    height: 46px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(236, 72, 153, 0.25);
    border-radius: 999px;
    display: flex;
    align-items: center;
    padding: 0 18px;
    gap: 12px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 0 24px rgba(236, 72, 153, 0.12);
  }
  .search-bar svg { width: 16px; height: 16px; color: var(--pink-bright); }
  .search-placeholder { font-size: 14px; color: var(--text-muted); font-weight: 500; }

  .section-eyebrow {
    position: relative;
    z-index: 5;
    margin: 14px 22px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .eyebrow-text {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .eyebrow-deco {
    font-size: 11px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }

  .carousel-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    margin-top: 6px;
  }

  .carousel {
    flex: 1;
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 12px 0 16px;
  }
  .carousel::-webkit-scrollbar { display: none; }

  .product-card {
    flex: 0 0 100%;
    scroll-snap-align: center;
    padding: 0 22px;
    display: flex;
    flex-direction: column;
  }

  .product-visual {
    flex: 1;
    min-height: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }

  /* === HOT DEAL BADGE — top-right corner === */
  .hot-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    z-index: 6;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px 5px 7px;
    background: linear-gradient(135deg, #ff8a3d 0%, #ff1744 100%);
    border-radius: 999px;
    box-shadow:
      0 4px 14px rgba(255, 60, 60, 0.5),
      0 0 20px rgba(255, 130, 50, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.25);
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 1.3px;
    color: #fff;
    animation: hotPulse 1.6s ease-in-out infinite;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }
  .hot-fire {
    font-size: 13px;
    line-height: 1;
    display: inline-block;
    animation: hotFire 1s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes hotPulse {
    0%, 100% {
      box-shadow:
        0 4px 14px rgba(255, 60, 60, 0.5),
        0 0 20px rgba(255, 130, 50, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }
    50% {
      box-shadow:
        0 4px 18px rgba(255, 60, 60, 0.85),
        0 0 30px rgba(255, 130, 50, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }
  }
  @keyframes hotFire {
    0%, 100% { transform: scale(1) rotate(-3deg); }
    50%      { transform: scale(1.18) rotate(4deg); }
  }

  .product-image {
    max-width: 92%;
    max-height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 30px 50px rgba(236, 72, 153, 0.45)) drop-shadow(0 10px 25px rgba(168, 85, 247, 0.35));
    z-index: 2;
    position: relative;
    animation: phoneFloat 4s ease-in-out infinite;
  }
  @keyframes phoneFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  .product-glow {
    position: absolute;
    width: 290px;
    height: 290px;
    background: radial-gradient(circle, rgba(236, 72, 153, 0.4) 0%, rgba(168, 85, 247, 0.2) 40%, transparent 70%);
    filter: blur(20px);
    z-index: 1;
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%      { opacity: 0.8; transform: scale(1.1); }
  }

  .sparkle {
    position: absolute;
    color: var(--pink-bright);
    font-weight: 800;
    pointer-events: none;
    animation: sparkleTwinkle 2.5s ease-in-out infinite;
    text-shadow: 0 0 8px var(--pink-glow);
    z-index: 3;
  }
  .sparkle.s1 { top: 14%; left: 8%; font-size: 14px; animation-delay: 0s; }
  .sparkle.s2 { top: 70%; right: 8%; font-size: 16px; animation-delay: 0.6s; color: var(--purple-bright); }
  .sparkle.s3 { bottom: 18%; left: 12%; font-size: 12px; animation-delay: 1.2s; }
  .sparkle.s4 { top: 45%; left: 4%; font-size: 13px; animation-delay: 1.8s; color: var(--purple-bright); }
  @keyframes sparkleTwinkle {
    0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
    50%      { opacity: 1; transform: scale(1.1) rotate(180deg); }
  }

  .product-info {
    background: var(--bg-card);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 18px 18px 16px;
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }

  .product-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin-bottom: 2px;
  }
  .product-color {
    font-size: 12px;
    font-weight: 600;
    color: var(--pink-bright);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .opt-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 10px;
  }
  .opt-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .opt-chips { display: flex; gap: 6px; }

  .chip {
    flex: 1;
    padding: 8px 6px;
    border-radius: 11px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 12px;
    font-weight: 700;
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    letter-spacing: 0.3px;
  }
  .chip:active { transform: scale(0.95); }
  .chip.selected {
    background: linear-gradient(135deg, rgba(236, 72, 153, 0.25), rgba(168, 85, 247, 0.25));
    border-color: var(--pink);
    color: #fff;
    box-shadow: 0 0 12px rgba(236, 72, 153, 0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
  }

  .dots {
    position: relative;
    z-index: 5;
    display: flex;
    justify-content: center;
    gap: 7px;
    padding: 8px 0 4px;
    flex-shrink: 0;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    transition: all 0.3s ease;
  }
  .dot.active {
    width: 22px;
    background: linear-gradient(90deg, var(--pink), var(--purple));
    box-shadow: 0 0 10px var(--pink-glow);
  }

  .bottom-area {
    position: relative;
    z-index: 5;
    padding: 8px 22px calc(env(safe-area-inset-bottom, 0) + 22px);
    flex-shrink: 0;
  }

  .order-btn {
    width: 100%;
    height: 56px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 12px 30px rgba(236, 72, 153, 0.5),
      0 0 0 1px rgba(236, 72, 153, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);
    transition: all 0.2s cubic-bezier(.34, 1.56, .64, 1);
  }
  .order-btn:active { transform: scale(0.98); }
  .order-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%   { left: -100%; }
    50%  { left: 100%; }
    100% { left: 100%; }
  }
  .order-btn span {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  /* ============================================ SCREEN 2: PACKING ============================================ */
  .unbox-screen { background: var(--bg-base); }

  .unbox-top {
    position: relative;
    z-index: 5;
    padding: calc(env(safe-area-inset-top, 0) + 18px) 22px 0;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  @media (min-width: 600px) {
    .unbox-top { padding-top: 58px; }
  }

  .back-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(236, 72, 153, 0.3);
    color: var(--pink-bright);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.15s ease;
  }
  .back-btn:active { transform: scale(0.9); }
  .back-btn svg { width: 18px; height: 18px; }

  .unbox-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 30px 30px;
    position: relative;
    z-index: 1;
    min-height: 0;
  }

  .unbox-eyebrow {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3.5px;
    background: linear-gradient(135deg, var(--pink-bright), var(--purple-bright));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .unbox-title {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-align: center;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff 0%, var(--pink-bright) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .unbox-hint {
    font-size: 13px;
    color: var(--text-soft);
    margin-bottom: 26px;
    letter-spacing: 0.3px;
    transition: all 0.4s ease;
    text-align: center;
  }
  .unbox-hint .pulse-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--pink-bright);
    border-radius: 50%;
    margin-right: 8px;
    animation: pulseDot 1.5s ease-in-out infinite;
    vertical-align: middle;
    box-shadow: 0 0 10px var(--pink-glow);
  }
  @keyframes pulseDot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.4); opacity: 0.6; }
  }

  .box {
    position: relative;
    width: 250px;
    height: 280px;
    perspective: 1200px;
    cursor: pointer;
    margin-top: 30px;
  }

  .box-glow {
    position: absolute;
    inset: -40px;
    background: radial-gradient(circle at center, rgba(236, 72, 153, 0.35) 0%, rgba(168, 85, 247, 0.2) 40%, transparent 70%);
    filter: blur(30px);
    z-index: 0;
    opacity: 0.7;
    animation: boxGlow 3s ease-in-out infinite;
  }
  @keyframes boxGlow {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.05); }
  }

  .box-base {
    position: absolute;
    inset: 60px 0 0 0;
    background: linear-gradient(135deg, #2d1b4e 0%, #1a0b2e 50%, #0d0420 100%);
    border: 1.5px solid rgba(236, 72, 153, 0.4);
    border-radius: 14px;
    box-shadow:
      0 20px 50px rgba(0, 0, 0, 0.5),
      0 0 30px rgba(236, 72, 153, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.08),
      inset 0 0 30px rgba(168, 85, 247, 0.1);
    overflow: hidden;
    z-index: 2;
  }
  .box-base::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(236, 72, 153, 0.08) 0%, transparent 50%);
  }
  .box-base::after {
    content: "";
    position: absolute;
    top: 50%;
    left: -50%;
    width: 200%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(236, 72, 153, 0.4), transparent);
    transform: translateY(-50%);
  }
  .box-logo-bottom {
    position: absolute;
    bottom: 14px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 5px;
    background: linear-gradient(135deg, var(--pink-bright), var(--purple-bright));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .box-inner {
    position: absolute;
    inset: 75px 14px 14px 14px;
    background: radial-gradient(ellipse at center 40%, #4c1d95 0%, #1e0a3c 60%, #0a0418 100%);
    border-radius: 8px;
    overflow: hidden;
    z-index: 3;
    box-shadow: inset 0 4px 16px rgba(0, 0, 0, 0.6);
  }
  .inner-pad {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, rgba(236, 72, 153, 0.05) 0, rgba(236, 72, 153, 0.05) 2px, transparent 2px, transparent 6px);
    opacity: 0.6;
  }
  .inner-light {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    height: 50%;
    background: radial-gradient(ellipse at center top, rgba(236, 72, 153, 0.5) 0%, transparent 70%);
    filter: blur(8px);
    opacity: 1;
    transition: opacity 0.4s ease;
  }
  .box.sealed .inner-light { opacity: 0; }

  .phone-float {
    position: absolute;
    top: -130px;
    left: 50%;
    width: 90%;
    z-index: 4;
    transition: top 0.85s cubic-bezier(.45, .15, .55, .95);
    animation: phoneHoverAnim 2.5s ease-in-out infinite;
  }
  @keyframes phoneHoverAnim {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-10px); }
  }
  .box.sealed .phone-float {
    top: 60px;
    animation: none;
    transform: translateX(-50%);
  }

  .box-phone {
    display: block;
    width: 100%;
    filter: drop-shadow(0 8px 28px rgba(236, 72, 153, 0.7)) drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
    transition: opacity 0.5s ease;
  }
  .box.sealed .box-phone {
    opacity: 0;
    transition-delay: 0.55s;
  }

  .box-lid {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 85px;
    background: linear-gradient(135deg, #3b1d6b 0%, #1e0e3a 50%, #0d0420 100%);
    border: 1.5px solid rgba(236, 72, 153, 0.5);
    border-radius: 14px;
    transform-origin: 50% 95%;
    transform: translateY(-55px) rotateX(-58deg);
    transition: transform 1s cubic-bezier(.4, 0, .4, 1);
    z-index: 6;
    overflow: hidden;
    box-shadow:
      0 10px 25px rgba(0, 0, 0, 0.5),
      0 0 20px rgba(168, 85, 247, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.12);
  }
  .box.sealed .box-lid {
    transform: translateY(0) rotateX(0);
    transition-delay: 0.4s;
  }

  .box-lid::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.1) 0%, transparent 30%, rgba(236, 72, 153, 0.08) 80%);
  }
  .box-lid::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 10%;
    right: 10%;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--pink), transparent);
    opacity: 0.6;
  }

  .lid-logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .lid-logo-mark {
    font-size: 26px;
    color: var(--pink-bright);
    filter: drop-shadow(0 0 12px var(--pink-glow));
    font-weight: 900;
    letter-spacing: -2px;
  }
  .lid-logo-text {
    font-size: 8px;
    font-weight: 800;
    letter-spacing: 4px;
    color: rgba(236, 72, 153, 0.7);
  }

  .box-seal {
    position: absolute;
    top: 85px;
    left: 14px;
    right: 14px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--pink-bright), transparent);
    opacity: 0;
    z-index: 7;
    box-shadow: 0 0 14px var(--pink-glow);
  }
  .box.sealed .box-seal {
    animation: sealFlash 0.5s ease-out 1.3s forwards;
  }
  @keyframes sealFlash {
    0%   { opacity: 0; transform: scaleX(0); }
    50%  { opacity: 1; transform: scaleX(1); }
    100% { opacity: 0; transform: scaleX(1); }
  }

  .box-floor {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 30px;
    background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.6) 0%, transparent 70%);
    filter: blur(10px);
    z-index: 1;
  }

  .success-msg {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0) + 30px);
    left: 22px;
    right: 22px;
    background: var(--bg-card);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(74, 222, 128, 0.35);
    border-radius: 18px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 30px rgba(74, 222, 128, 0.15);
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    transition: all 0.5s cubic-bezier(.34, 1.56, .64, 1);
    pointer-events: none;
    z-index: 10;
  }
  .success-msg.show {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .success-check {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4ade80, #059669);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(74, 222, 128, 0.5);
  }
  .success-check svg { width: 20px; height: 20px; color: #fff; stroke-width: 3; }

  .success-info { flex: 1; min-width: 0; }
  .success-title { font-size: 14px; font-weight: 800; color: #fff; }
  .success-text { font-size: 11px; color: var(--text-soft); margin-top: 2px; letter-spacing: 0.3px; }

  .success-eta { text-align: right; flex-shrink: 0; }
  .success-eta-label {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .success-eta-value {
    font-size: 14px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--pink-bright), var(--purple-bright));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div class="device-wrap">
  <div class="device">

    <div class="bg-effects"></div>
    <div class="bg-grid"></div>

    <!-- ========== SCREEN 1: CATALOG ========== -->
    <div class="screen active" id="screen-catalog">

      <div class="top-bar">
        <div class="logo-mark">PHONE · SHOP</div>
        <div class="cart-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
          </svg>
          <span class="cart-dot"></span>
        </div>
      </div>

      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="search-placeholder">Search products...</span>
      </div>

      <div class="section-eyebrow">
        <span class="eyebrow-text">New Drops</span>
        <span class="eyebrow-deco">✦ EXCLUSIVE</span>
      </div>

      <div class="carousel-wrap">
        <div class="carousel" id="carousel"></div>
        <div class="dots" id="dots"></div>
      </div>

      <div class="bottom-area">
        <button class="order-btn" onclick="orderPhone()">
          <span>
            Order Now
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </span>
        </button>
      </div>

    </div>

    <!-- ========== SCREEN 2: PACKING ========== -->
    <div class="screen unbox-screen" id="screen-unbox">

      <div class="unbox-top">
        <button class="back-btn" onclick="backToCatalog()" aria-label="Back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      </div>

      <div class="unbox-content">
        <div class="unbox-eyebrow">✦ Confirming order</div>
        <div class="unbox-title" id="unboxTitle">Pack your iPhone</div>
        <div class="unbox-hint" id="unboxHint">
          <span class="pulse-dot"></span>Tap the box to seal it
        </div>

        <div class="box" id="box" onclick="sealBox()">
          <div class="box-glow"></div>
          <div class="box-floor"></div>

          <div class="box-base">
            <div class="box-logo-bottom">PHONE · SHOP</div>
          </div>

          <div class="box-inner">
            <div class="inner-pad"></div>
            <div class="inner-light"></div>
          </div>

          <div class="phone-float">
            <img class="box-phone" id="boxPhone" src="" alt="">
          </div>

          <div class="box-seal"></div>

          <div class="box-lid">
            <div class="lid-logo">
              <div class="lid-logo-mark">⌬</div>
              <div class="lid-logo-text">PREMIUM</div>
            </div>
          </div>
        </div>

        <div class="success-msg" id="successMsg">
          <div class="success-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="success-info">
            <div class="success-title">Order placed</div>
            <div class="success-text">Your order is on the way</div>
          </div>
          <div class="success-eta">
            <div class="success-eta-label">Status</div>
            <div class="success-eta-value">PACKED</div>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
  // ============================================
  // PRODUCTS — citypng.com front+back transparent PNGs
  // All same dual-view angle for consistency
  // ============================================
  const PRODUCTS = [
    {
      name: "iPhone 17 Pro Max",
      color: "Deep Blue",
      image: "https://city-png.b-cdn.net/preview/preview_public/temp/deep-blue-iphone-17-pro-max-in-front-and-back-view-131757671389gkiyyxpa3k.webp"
    },
    {
      name: "iPhone 17 Pro Max",
      color: "Cosmic Orange",
      image: "https://city-png.b-cdn.net/preview/preview_public/temp/orange-iphone-17-pro-max-in-front-and-back-view-131757670309qddqcltlwg.webp"
    },
    {
      name: "iPhone 17",
      color: "Pink Lavender",
      image: "https://city-png.b-cdn.net/preview/preview_public/temp/pink-lavender-apple-iphone-17-front-and-back-131757619986lgmnstz628.webp"
    },
    {
      name: "iPhone 17",
      color: "Stealth Black",
      image: "https://city-png.b-cdn.net/preview/preview_public/temp/black-apple-iphone-17-back-and-front-13175761484654ydxaanvm.webp"
    },
    {
      name: "iPhone 17",
      color: "Sage Green",
      image: "https://city-png.b-cdn.net/preview/preview_public/temp/iphone-17-sage-green-front-and-back-view-131757613993gghtevf310.webp"
    }
  ];

  let currentIndex = 0;

  const carousel = document.getElementById("carousel");
  const dotsContainer = document.getElementById("dots");

  PRODUCTS.forEach((product, idx) => {
    const card = document.createElement("div");
    card.className = "product-card";
    card.dataset.index = idx;
    card.innerHTML = `
      <div class="product-visual">
        <div class="hot-badge">
          <span class="hot-fire">🔥</span>
          <span>HOT DEAL</span>
        </div>
        <span class="sparkle s1">✦</span>
        <span class="sparkle s2">✧</span>
        <span class="sparkle s3">✦</span>
        <span class="sparkle s4">✧</span>
        <div class="product-glow"></div>
        <img class="product-image" src="${product.image}" alt="${product.name}">
      </div>
      <div class="product-info">
        <div class="product-name">${product.name}</div>
        <div class="product-color">${product.color}</div>

        <div class="opt-row">
          <div class="opt-label">Storage</div>
          <div class="opt-chips" data-group="storage">
            <div class="chip">256GB</div>
            <div class="chip selected">512GB</div>
            <div class="chip">1TB</div>
          </div>
        </div>

        <div class="opt-row">
          <div class="opt-label">SIM Type</div>
          <div class="opt-chips sim-chips" data-group="sim">
            <div class="chip selected">Nano</div>
            <div class="chip">eSIM</div>
            <div class="chip">Dual</div>
          </div>
        </div>
      </div>
    `;
    carousel.appendChild(card);

    const dot = document.createElement("div");
    dot.className = "dot" + (idx === 0 ? " active" : "");
    dotsContainer.appendChild(dot);
  });

  carousel.addEventListener("click", (e) => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    const group = chip.parentElement;
    group.querySelectorAll(".chip").forEach(c => c.classList.remove("selected"));
    chip.classList.add("selected");
  });

  let scrollTimer = null;
  carousel.addEventListener("scroll", () => {
    if (scrollTimer) cancelAnimationFrame(scrollTimer);
    scrollTimer = requestAnimationFrame(() => {
      const cardWidth = carousel.clientWidth;
      const newIndex = Math.round(carousel.scrollLeft / cardWidth);
      if (newIndex !== currentIndex && newIndex >= 0 && newIndex < PRODUCTS.length) {
        currentIndex = newIndex;
        updateDots();
      }
    });
  });

  function updateDots() {
    const dots = dotsContainer.querySelectorAll(".dot");
    dots.forEach((dot, idx) => {
      dot.classList.toggle("active", idx === currentIndex);
    });
  }

  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function orderPhone() {
    const product = PRODUCTS[currentIndex];
    const boxPhone = document.getElementById("boxPhone");
    boxPhone.src = product.image;

    document.getElementById("unboxTitle").textContent = "Pack your " + product.name.replace("iPhone 17", "iPhone");

    document.getElementById("box").classList.remove("sealed");
    document.getElementById("successMsg").classList.remove("show");
    document.getElementById("unboxHint").innerHTML = '<span class="pulse-dot"></span>Tap the box to seal it';

    showScreen("screen-unbox");
  }

  function backToCatalog() {
    showScreen("screen-catalog");
  }

  function sealBox() {
    const box = document.getElementById("box");
    if (box.classList.contains("sealed")) return;
    box.classList.add("sealed");

    setTimeout(() => {
      document.getElementById("unboxHint").innerHTML = '✦ Sealed and shipped ✦';
    }, 1000);

    setTimeout(() => {
      document.getElementById("successMsg").classList.add("show");
    }, 1700);
  }
</script>
</body>
</html>
